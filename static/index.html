<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
<body>
    <div class="widget">
        <div class="header">
            <h2>London</h2>
        </div>

        <div class="widget-main">
            <div class="current-weather">
                <h3>Tonight</h3>
                <div class="current-infa">
                    <img class="icon">
                    <div class="current-temp">
                        <span class="value" id="cur.-low">28</span>
                    </div>
                    <div class="current-desc">Sunny, no rain</div>
                </div>
            </div>
        </div>
        <div class="forecast-days" id="forecast-days-container"></div>
    </div>
</body>

</html>
