<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="script.js" defer></script>
</head>

<body>
  <main class="container">
    <header>
      <h1>Weather</h1>
      <label class="switch" aria-label="Toggle theme">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
      </label>
    </header>

    <section class="search-box">
      <input type="text" id="searchInput" placeholder="Введіть місто..." autocomplete="off" list="cities">
      <datalist id="cities">
        <option value="Kyiv">
        <option value="Lviv">
        <option value="Odesa">
        <option value="Kharkiv">
      </datalist>
      <button onclick="getWeather()">Отримати погоду</button>
    </section>

    <div class="error"></div>
    <div class="weather"></div>
    <div class="forecast"></div>

    <div class="forecast-container" id="forecastContainer"></div>

  </main>
</body>

</html>
